<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="The Plan">
<meta name="theme-color" content="#1D9E75">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>The Plan</title>
<style>
:root {
  --accent: #1D9E75;
  --accent-light: #E1F5EE;
  --accent-mid: #9FE1CB;
  --accent-dark: #0F6E56;
  --text: #1a1a1a;
  --text-muted: #6b7280;
  --text-hint: #9ca3af;
  --border: rgba(0,0,0,0.12);
  --border-mid: rgba(0,0,0,0.2);
  --bg: #faf7f2;
  --bg-surface: #f2ece0;
  --bg-card: #fffdf8;
  --radius: 10px;
  --radius-lg: 14px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
[data-theme="light"],:root{
  --text: #1a1a1a;--text-muted: #6b7280;--text-hint: #9ca3af;
  --border: rgba(0,0,0,0.12);--border-mid: rgba(0,0,0,0.2);
  --bg: #faf7f2;--bg-surface: #f2ece0;--bg-card: #fffdf8;
  --accent-light: #E1F5EE;--accent-mid: #9FE1CB;--accent-dark: #0F6E56;
}
[data-theme="dark"],
@media (prefers-color-scheme: dark) {
  :root {
    --text: #f0f0ee; --text-muted: #9ca3af; --text-hint: #6b7280;
    --border: rgba(255,255,255,0.12); --border-mid: rgba(255,255,255,0.2);
    --bg: #1a1712; --bg-surface: #242018; --bg-card: #2a261e;
    --accent-light: #04342C; --accent-mid: #085041; --accent-dark: #9FE1CB;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{padding-top:var(--safe-top);padding-bottom:var(--safe-bottom)}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* Sign-in */
.signin-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;gap:24px}
.signin-icon{font-size:48px}
.signin-title{font-size:26px;font-weight:600;color:var(--text)}
.signin-sub{font-size:14px;color:var(--text-muted);text-align:center;line-height:1.5}
.signin-input{width:100%;border:0.5px solid var(--border-mid);border-radius:var(--radius-lg);padding:14px 16px;font-size:16px;font-family:inherit;color:var(--text);background:var(--bg-card);outline:none;text-align:center;letter-spacing:0.05em}
.signin-input:focus{border-color:var(--accent)}
.signin-btn{width:100%;padding:14px;border-radius:var(--radius-lg);border:none;background:var(--accent);color:white;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer}
.signin-btn:disabled{opacity:0.5}
.signin-error{font-size:13px;color:#D85A30;text-align:center}

/* Main */
.main-app{display:none;flex-direction:column;flex:1}
.header{padding:16px 20px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border)}
.header-day{font-size:22px;font-weight:600}
.header-sub{font-size:13px;color:var(--text-muted);margin-top:1px}
.header-nav{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.nav-tab{padding:6px 11px;border-radius:20px;font-size:12px;font-weight:500;border:none;background:transparent;color:var(--text-muted);cursor:pointer}
.nav-tab.active{background:var(--accent);color:white}
.progress-wrap{padding:10px 20px}
.progress-row{display:flex;align-items:center;gap:10px}
.progress-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width 0.4s ease}
.progress-label{font-size:12px;color:var(--text-muted);min-width:32px;text-align:right}
.content{flex:1;overflow-y:auto;padding:16px 20px 100px}
.section-label{font-size:11px;font-weight:600;letter-spacing:0.08em;color:var(--text-muted);text-transform:uppercase;margin-bottom:10px;margin-top:20px}
.section-label:first-child{margin-top:0}

/* Mood */
.mood-row{display:flex;justify-content:space-between;gap:6px}
.mood-btn{flex:1;aspect-ratio:1;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--bg-card);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.mood-btn span.mlabel{font-size:10px;color:var(--text-hint)}
.mood-btn.selected{border-color:var(--accent);background:var(--accent-light)}
.mood-btn.selected span.mlabel{color:var(--accent-dark)}

/* Checklist */
.checklist{display:flex;flex-direction:column;gap:6px}
.check-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--bg-card);cursor:pointer;user-select:none;transition:all 0.15s}
.check-item.done{border-color:var(--accent-mid);background:var(--accent-light)}
.check-item.done .check-label{color:var(--accent-dark);text-decoration:line-through;text-decoration-color:var(--accent-mid)}
.check-circle{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border-mid);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.check-item.done .check-circle{background:var(--accent);border-color:var(--accent)}
.checkmark{width:10px;height:7px;border-left:2px solid white;border-bottom:2px solid white;transform:rotate(-45deg) translate(1px,-1px);opacity:0}
.check-item.done .checkmark{opacity:1}
.check-label{font-size:15px;color:var(--text)}

/* Category cards */
.cat-grid{display:flex;flex-direction:column;gap:10px}
.cat-card{border-radius:var(--radius-lg);border:0.5px solid var(--border);background:var(--bg-card);overflow:hidden}
.cat-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.cat-title{font-size:15px;font-weight:500;color:var(--text)}
.cat-arrow{font-size:11px;color:var(--text-hint);transition:transform 0.2s}
.cat-card.open .cat-arrow{transform:rotate(180deg)}
.cat-body{display:none;padding:12px 16px 14px;flex-direction:column;gap:8px;border-top:0.5px solid var(--border)}
.cat-card.open .cat-body{display:flex}
.sub-check{display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;user-select:none}
.sub-box{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border-mid);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.sub-check.done .sub-box{background:var(--accent);border-color:var(--accent)}
.sub-mark{width:9px;height:6px;border-left:1.5px solid white;border-bottom:1.5px solid white;transform:rotate(-45deg) translate(1px,-1px);opacity:0}
.sub-check.done .sub-mark{opacity:1}
.sub-label{font-size:14px;color:var(--text-muted)}
.sub-check.done .sub-label{color:var(--accent-dark);text-decoration:line-through;text-decoration-color:var(--accent-mid)}
.tag-wrap{display:flex;flex-wrap:wrap;gap:6px}
.ftag{font-size:13px;padding:6px 12px;border-radius:20px;border:0.5px solid var(--border);background:var(--bg-surface);color:var(--text-muted);cursor:pointer;user-select:none;transition:all 0.15s}
.ftag.active{background:var(--accent-light);border-color:var(--accent-mid);color:var(--accent-dark);font-weight:500}
.row-input{display:flex;gap:8px}
.row-input input{flex:1;border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;font-size:14px;font-family:inherit;color:var(--text);background:var(--bg-surface);outline:none;min-width:0}
.row-input input:focus{border-color:var(--accent)}
.add-btn{border:0.5px solid var(--border-mid);border-radius:var(--radius);background:transparent;padding:10px 14px;font-size:18px;color:var(--text-muted);cursor:pointer}
.vinyl-entry{font-size:14px;color:var(--text);padding:6px 0;border-bottom:0.5px solid var(--border)}
.vinyl-entry:last-of-type{border-bottom:none}
.house-item{display:flex;align-items:center;gap:10px;padding:7px 0;cursor:pointer;user-select:none;border-bottom:0.5px solid var(--border)}
.house-item:last-of-type{border-bottom:none}
.house-item.done .sub-label{color:var(--accent-dark);text-decoration:line-through;text-decoration-color:var(--accent-mid)}
.house-item.done .sub-box{background:var(--accent);border-color:var(--accent)}
.house-item.done .sub-mark{opacity:1}
.freewrite{width:100%;border:0.5px solid var(--border);border-radius:var(--radius);padding:12px;font-size:14px;font-family:inherit;color:var(--text);background:var(--bg-card);outline:none;resize:none;line-height:1.6;min-height:100px}
.freewrite:focus{border-color:var(--accent)}
.save-wrap{padding:16px 20px;border-top:0.5px solid var(--border);background:var(--bg)}
.save-btn{width:100%;padding:14px;border-radius:var(--radius-lg);border:none;background:var(--accent);color:white;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.15s}
.save-btn:active{transform:scale(0.98);opacity:0.9}
.save-btn.saved{opacity:0.7}
.sync-status{font-size:12px;color:var(--text-hint);text-align:center;padding:4px 0}

/* History */
#history-view{display:none}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav span{font-size:16px;font-weight:500}
.cal-nav button{border:0.5px solid var(--border);border-radius:var(--radius);background:transparent;padding:7px 14px;font-size:15px;color:var(--text-muted);cursor:pointer}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.cal-dow{font-size:11px;color:var(--text-hint);text-align:center;padding:4px 0}
.cal-day{aspect-ratio:1;border-radius:var(--radius);border:0.5px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--text-muted);background:var(--bg-card);gap:3px}
.cal-day.empty{border-color:transparent;background:transparent;cursor:default}
.cal-day.today{border-color:var(--accent);color:var(--accent-dark);font-weight:600}
.cal-day.has-entry{background:var(--accent-light);border-color:var(--accent-mid)}
.cal-day.has-entry .cal-num{color:var(--accent-dark);font-weight:500}
.cal-day.selected{border:2px solid var(--accent)}
.cal-dot{width:4px;height:4px;border-radius:50%;background:var(--accent)}
.past-card{border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;background:var(--bg-card)}
.past-date-label{font-size:13px;font-weight:500;color:var(--text-muted);margin-bottom:12px}
.past-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.chip{font-size:12px;padding:4px 10px;border-radius:20px}
.chip.done{background:var(--accent-light);color:var(--accent-dark);border:0.5px solid var(--accent-mid)}
.chip.miss{background:var(--bg-surface);color:var(--text-hint);border:0.5px solid var(--border)}
.past-section{margin-top:10px}
.past-section-title{font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}
.past-items{display:flex;flex-wrap:wrap;gap:5px}
.past-item{font-size:12px;padding:4px 10px;border-radius:20px;background:var(--bg-surface);color:var(--text-muted);border:0.5px solid var(--border)}
.past-item.done{background:var(--accent-light);color:var(--accent-dark);border-color:var(--accent-mid)}
.past-note{font-size:14px;color:var(--text);line-height:1.6;margin-top:4px;font-style:italic}
.no-entry{text-align:center;padding:2rem;color:var(--text-hint);font-size:14px}

/* Stats */
#stats-view{display:none}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.stat-card{border-radius:var(--radius-lg);border:0.5px solid var(--border);background:var(--bg-card);padding:14px 16px}
.stat-num{font-size:28px;font-weight:600;color:var(--accent)}
.stat-label{font-size:12px;color:var(--text-muted);margin-top:2px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{font-size:13px;color:var(--text-muted);min-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;background:var(--accent);border-radius:4px}
.bar-pct{font-size:12px;color:var(--text-muted);min-width:32px;text-align:right}
.mood-stats{display:flex;gap:10px;flex-wrap:wrap}
.mood-stat{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted)}

/* Customize */
#customize-view{display:none}
.cust-section{margin-bottom:24px}
.cust-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.cust-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--bg-card)}
.cust-item input{flex:1;border:none;background:transparent;font-size:14px;font-family:inherit;color:var(--text);outline:none;min-width:0}
.del-btn{border:none;background:transparent;color:var(--text-hint);font-size:18px;cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0}
.del-btn:hover{color:#D85A30}
.cust-add-row{display:flex;gap:8px}
.cust-add-row input{flex:1;border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;font-size:14px;font-family:inherit;color:var(--text);background:var(--bg-surface);outline:none;min-width:0}
.cust-add-row input:focus{border-color:var(--accent)}
.cust-save-btn{width:100%;padding:13px;border-radius:var(--radius-lg);border:none;background:var(--accent);color:white;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:8px}
.cust-save-btn.saved{opacity:0.7}
.focus-area-block{border:0.5px solid var(--border);border-radius:var(--radius-lg);background:var(--bg-card);padding:14px 16px;margin-bottom:12px}
.focus-area-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.focus-area-header input{flex:1;border:none;background:transparent;font-size:15px;font-weight:500;font-family:inherit;color:var(--text);outline:none}
.focus-type-select{font-size:12px;padding:4px 8px;border-radius:20px;border:0.5px solid var(--border);background:var(--bg-surface);color:var(--text-muted);font-family:inherit;outline:none;cursor:pointer}

/* Settings */
#settings-view{display:none}
.color-swatches{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.swatch{width:44px;height:44px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all 0.15s}
.swatch.selected{border-color:var(--text)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:var(--radius-lg);border:0.5px solid var(--border);background:var(--bg-card);margin-top:8px}.toggle-label{font-size:15px;color:var(--text)}.toggle{position:relative;width:48px;height:28px;flex-shrink:0}.toggle input{opacity:0;width:0;height:0}.toggle-slider{position:absolute;inset:0;background:var(--border-mid);border-radius:14px;cursor:pointer;transition:background 0.2s}.toggle-slider:before{content:"";position:absolute;width:22px;height:22px;left:3px;top:3px;background:white;border-radius:50%;transition:transform 0.2s}.toggle input:checked+.toggle-slider{background:var(--accent)}.toggle input:checked+.toggle-slider:before{transform:translateX(20px)}.signout-btn{margin-top:32px;width:100%;padding:12px;border-radius:var(--radius-lg);border:0.5px solid var(--border-mid);background:transparent;color:var(--text-muted);font-size:14px;font-family:inherit;cursor:pointer}
</style>
</head>
<body>
<div class="app">

  <div class="signin-screen" id="signin-screen">
    <div class="signin-icon">📓</div>
    <div class="signin-title">The Plan</div>
    <div class="signin-sub">Enter your access code to continue</div>
    <input class="signin-input" id="code-input" type="text" placeholder="enter your access code" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
    <button class="signin-btn" id="signin-btn" onclick="submitCode()">Enter</button>
    <div class="signin-error" id="signin-error"></div>
  </div>

  <div class="main-app" id="main-app">
    <div class="header">
      <div>
        <div class="header-day" id="header-day"></div>
        <div class="header-sub" id="header-sub"></div>
      </div>
      <div class="header-nav">
        <button class="nav-tab active" id="tab-today" onclick="showView('today')">Today</button>
        <button class="nav-tab" id="tab-history" onclick="showView('history')">History</button>
        <button class="nav-tab" id="tab-stats" onclick="showView('stats')">Stats</button>
        <button class="nav-tab" id="tab-customize" onclick="showView('customize')">Customize</button>
        <button class="nav-tab" id="tab-settings" onclick="showView('settings')">&#9881;</button>
      </div>
    </div>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-row">
        <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
        <div class="progress-label" id="progress-label">0/0</div>
      </div>
    </div>

    <!-- TODAY -->
    <div id="today-view" style="display:flex;flex-direction:column;flex:1">
      <div class="content">
        <div style="text-align:center;padding:8px 0 16px;font-size:28px;font-weight:700;color:var(--accent);letter-spacing:-0.5px">The Plan</div>
        <div class="section-label">How are you feeling?</div>
        <div class="mood-row">
          <button class="mood-btn" data-mood="1" onclick="selectMood(1)"><span style="font-size:22px">😔</span><span class="mlabel">rough</span></button>
          <button class="mood-btn" data-mood="2" onclick="selectMood(2)"><span style="font-size:22px">😕</span><span class="mlabel">meh</span></button>
          <button class="mood-btn" data-mood="3" onclick="selectMood(3)"><span style="font-size:22px">🙂</span><span class="mlabel">ok</span></button>
          <button class="mood-btn" data-mood="4" onclick="selectMood(4)"><span style="font-size:22px">😊</span><span class="mlabel">good</span></button>
          <button class="mood-btn" data-mood="5" onclick="selectMood(5)"><span style="font-size:22px">😄</span><span class="mlabel">great</span></button>
        </div>
        <div class="section-label">Daily checklist</div>
        <div class="checklist" id="checklist-items"></div>
        <div class="section-label">Focus areas</div>
        <div class="cat-grid" id="focus-areas"></div>
        <div class="section-label">Notes</div>
        <textarea class="freewrite" id="freewrite" placeholder="Anything on your mind today..."></textarea>
      </div>
      <div class="save-wrap">
        <div class="sync-status" id="sync-status"></div>
        <button class="save-btn" id="save-btn" onclick="saveEntry()">Save today</button>
      </div>
    </div>

    <!-- HISTORY -->
    <div id="history-view">
      <div class="content">
        <div class="cal-nav">
          <button onclick="calPrev()">&#8592;</button>
          <span id="cal-month-label"></span>
          <button onclick="calNext()">&#8594;</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
        <div id="past-entry-display"></div>
      </div>
    </div>

    <!-- STATS -->
    <div id="stats-view">
      <div class="content">
        <div class="section-label" style="margin-top:0">This month</div>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-num" id="stat-entries">0</div><div class="stat-label">Days logged</div></div>
          <div class="stat-card"><div class="stat-num" id="stat-perfect">0</div><div class="stat-label">Perfect days</div></div>
          <div class="stat-card"><div class="stat-num" id="stat-streak">0</div><div class="stat-label">Current streak</div></div>
          <div class="stat-card"><div class="stat-num" id="stat-avg">0</div><div class="stat-label">Avg checks / day</div></div>
        </div>
        <div class="section-label">Checklist this month</div>
        <div id="check-bars"></div>
        <div class="section-label">Mood this month</div>
        <div class="mood-stats" id="mood-stats"></div>
      </div>
    </div>

    <!-- CUSTOMIZE -->
    <div id="customize-view">
      <div class="content">
        <div class="section-label" style="margin-top:0">Daily checklist items</div>
        <div class="cust-list" id="cust-checklist"></div>
        <div class="cust-add-row">
          <input id="cust-check-input" type="text" placeholder="Add checklist item..." />
          <button class="add-btn" onclick="custAddCheck()">+</button>
        </div>

        <div class="section-label">Focus areas</div>
        <div id="cust-focus-areas"></div>
        <div class="cust-add-row" style="margin-top:4px">
          <input id="cust-focus-input" type="text" placeholder="Add focus area..." />
          <button class="add-btn" onclick="custAddFocus()">+</button>
        </div>

        <button class="cust-save-btn" id="cust-save-btn" onclick="saveSettings()">Save changes</button>
      </div>
    </div>

    <!-- SETTINGS -->
    <div id="settings-view">
      <div class="content">
        <div class="section-label" style="margin-top:0">Appearance</div>

// TODAY UI — dynamic based on settings
function renderTodayUI(){
  // Checklist
  const cl=document.getElementById('checklist-items');cl.innerHTML='';
  settings.checklist.forEach(label=>{
    const key=label.toLowerCase().replace(/[^a-z0-9]/g,'_');
    const el=document.createElement('div');el.className='check-item'+(state.checks&&state.checks[key]?' done':'');
    el.dataset.key=key;
    el.innerHTML='<div class="check-circle"><div class="checkmark"></div></div><span class="check-label">'+label+'</span>';
    el.addEventListener('click',()=>{
      el.classList.toggle('done');
      if(!state.checks)state.checks={};
      state.checks[key]=el.classList.contains('done');
      updateProgress();
    });
    cl.appendChild(el);
  });
  updateProgress();

  // Focus areas
  const fa=document.getElementById('focus-areas');fa.innerHTML='';
  settings.focusAreas.forEach((area,idx)=>{
    const card=document.createElement('div');card.className='cat-card';card.id='cat-focus-'+idx;
    const aKey='focus_'+idx;
    if(!state.focusData)state.focusData={};
    if(!state.focusData[aKey])state.focusData[aKey]={};
    const fd=state.focusData[aKey];

    let bodyHtml='';
    if(area.type==='log'){
      const entries=(fd.entries||[]).map(v=>'<div class="vinyl-entry">'+v+'</div>').join('');
      bodyHtml='<div id="flog-'+idx+'">'+entries+'</div><div class="row-input"><input id="flog-input-'+idx+'" type="text" placeholder="Add entry..." /><button class="add-btn" onclick="addLogEntry('+idx+')">+</button></div>';
    }else if(area.type==='tags'){
      const tags=(area.items||[]).map(t=>'<div class="ftag'+((fd.tags||[]).includes(t)?' active':'')+'" onclick="toggleAreaTag(this,'+idx+')">'+t+'</div>').join('');
      bodyHtml='<div class="tag-wrap" id="ftags-'+idx+'">'+tags+'</div><div class="row-input"><input id="ftag-input-'+idx+'" type="text" placeholder="Other..." /><button class="add-btn" onclick="addAreaTag('+idx+')">+</button></div>';
    }else if(area.type==='checks'){
      const checks=(area.items||[]).map(item=>'<div class="sub-check'+((fd.checks||[]).includes(item)?' done':'')+'" onclick="toggleAreaCheck(this,\''+item+'\','+idx+')"><div class="sub-box"><div class="sub-mark"></div></div><span class="sub-label">'+item+'</span></div>').join('');
      bodyHtml=checks;
    }else if(area.type==='tasks'){
      const tasks=(fd.tasks||[]).map((t,ti)=>'<div class="house-item'+(t.done?' done':'')+'" onclick="toggleAreaTask(this,'+idx+','+ti+')"><div class="sub-box"><div class="sub-mark"></div></div><span class="sub-label">'+t.label+'</span></div>').join('');
      bodyHtml='<div id="ftasks-'+idx+'">'+tasks+'</div><div class="row-input"><input id="ftask-input-'+idx+'" type="text" placeholder="Add task..." /><button class="add-btn" onclick="addAreaTask('+idx+')">+</button></div>';
    }
    card.innerHTML='<div class="cat-header" onclick="toggleCat(\'cat-focus-'+idx+'\')"><span class="cat-title">'+area.name+'</span><span class="cat-arrow">▾</span></div><div class="cat-body">'+bodyHtml+'</div>';
    fa.appendChild(card);

    // re-attach keydown for inputs
    const inp=card.querySelector('input[id^="flog-input-"],input[id^="ftag-input-"],input[id^="ftask-input-"]');
    if(inp){inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'){
        if(area.type==='log')addLogEntry(idx);
        else if(area.type==='tags')addAreaTag(idx);

}

function updateProgress(){
  const total=settings.checklist.length;
  const done=settings.checklist.filter(label=>{
    const key=label.toLowerCase().replace(/[^a-z0-9]/g,'_');
    return state.checks&&state.checks[key];
  }).length;
  document.getElementById('progress').style.width=total?Math.round(done/total*100)+'%':'0%';
  document.getElementById('progress-label').textContent=done+'/'+total;
}

// Focus area interactions
function addLogEntry(idx){
  const inp=document.getElementById('flog-input-'+idx);const v=inp.value.trim();if(!v)return;
  const aKey='focus_'+idx;if(!state.focusData[aKey].entries)state.focusData[aKey].entries=[];
  state.focusData[aKey].entries.push(v);
  const d=document.createElement('div');d.className='vinyl-entry';d.textContent=v;
  document.getElementById('flog-'+idx).appendChild(d);inp.value='';
}
function toggleAreaTag(el,idx){
  el.classList.toggle('active');const v=el.textContent;
  const aKey='focus_'+idx;if(!state.focusData[aKey].tags)state.focusData[aKey].tags=[];
  if(el.classList.contains('active')){if(!state.focusData[aKey].tags.includes(v))state.focusData[aKey].tags.push(v);}
  else{state.focusData[aKey].tags=state.focusData[aKey].tags.filter(x=>x!==v);}
}
function addAreaTag(idx){
  const inp=document.getElementById('ftag-input-'+idx);const v=inp.value.trim();if(!v)return;
  const aKey='focus_'+idx;if(!state.focusData[aKey].tags)state.focusData[aKey].tags=[];
  if(!state.focusData[aKey].tags.includes(v))state.focusData[aKey].tags.push(v);
  const tag=document.createElement('div');tag.className='ftag active';tag.textContent=v;
  tag.onclick=()=>toggleAreaTag(tag,idx);
  document.getElementById('ftags-'+idx).appendChild(tag);inp.value='';
}
function toggleAreaCheck(el,item,idx){
  el.classList.toggle('done');const aKey='focus_'+idx;
  if(!state.focusData[aKey].checks)state.focusData[aKey].checks=[];
  if(el.classList.contains('done')){if(!state.focusData[aKey].checks.includes(item))state.focusData[aKey].checks.push(item);}
  else{state.focusData[aKey].checks=state.focusData[aKey].checks.filter(x=>x!==item);}
}
function addAreaTask(idx){
  const inp=document.getElementById('ftask-input-'+idx);const v=inp.value.trim();if(!v)return;
  const aKey='focus_'+idx;if(!state.focusData[aKey].tasks)state.focusData[aKey].tasks=[];
  const task={label:v,done:false};state.focusData[aKey].tasks.push(task);
  const ti=state.focusData[aKey].tasks.length-1;
  const el=document.createElement('div');el.className='house-item';
  el.innerHTML='<div class="sub-box"><div class="sub-mark"></div></div><span class="sub-label">'+v+'</span>';
  el.onclick=()=>toggleAreaTask(el,idx,ti);
  document.getElementById('ftasks-'+idx).appendChild(el);inp.value='';
}
function toggleAreaTask(el,idx,ti){
  el.classList.toggle('done');
  const aKey='focus_'+idx;
  if(state.focusData[aKey].tasks&&state.focusData[aKey].tasks[ti]){
    state.focusData[aKey].tasks[ti].done=el.classList.contains('done');
  }
}

function selectMood(m){
  state.mood=m;
  document.querySelectorAll('.mood-btn').forEach(b=>b.classList.toggle('selected',parseInt(b.dataset.mood)===m));
}
function toggleCat(id){document.getElementById(id).classList.toggle('open');}

// ENTRIES
async function loadAllEntries(){
  try{
    const rows=await sbFetch('journal_entries?code=eq.'+encodeURIComponent(userCode)+'&select=date,data&order=date.desc');
    allEntries=rows||[];
  }catch(e){allEntries=[];}
}
function getEntry(dateKey){const row=allEntries.find(r=>r.date===dateKey);return row?row.data:null;}

function loadToday(){
  const saved=getEntry(todayKey);
  if(saved){
    state=saved;
    if(!state.focusData)state.focusData={};
    selectMood(state.mood||0);
    document.getElementById('freewrite').value=state.note||'';
  }
}

async function saveEntry(){
  const btn=document.getElementById('save-btn');const status=document.getElementById('sync-status');
  btn.disabled=true;btn.textContent='Saving...';
  try{
    const existing=allEntries.find(r=>r.date===todayKey);
    if(existing){
      await sbFetch('journal_entries?code=eq.'+encodeURIComponent(userCode)+'&date=eq.'+todayKey,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({data:state})});
      existing.data=state;
    }else{
      await sbFetch('journal_entries',{method:'POST',body:JSON.stringify({code:userCode,date:todayKey,data:state})});
      allEntries.unshift({code:userCode,date:todayKey,data:state});
    }
    btn.textContent='Saved ✓';status.textContent='Synced to cloud';
    setTimeout(()=>{btn.textContent='Save today';btn.disabled=false;status.textContent='';},2000);
  }catch(e){btn.textContent='Save today';btn.disabled=false;status.textContent='Could not sync — check your connection';}
}

// HISTORY
function renderCal(){
  const entryDates=new Set(allEntries.map(r=>r.date));
  document.getElementById('cal-month-label').textContent=MONTHS[calMonth]+' '+calYear;
  const grid=document.getElementById('cal-grid');grid.innerHTML='';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d=>{const el=document.createElement('div');el.className='cal-dow';el.textContent=d;grid.appendChild(el);});
  const first=new Date(calYear,calMonth,1).getDay();
  const total=new Date(calYear,calMonth+1,0).getDate();
  for(let i=0;i<first;i++){const el=document.createElement('div');el.className='cal-day empty';grid.appendChild(el);}
  for(let d=1;d<=total;d++){
    const dk=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const el=document.createElement('div');el.className='cal-day';
    const num=document.createElement('span');num.className='cal-num';num.textContent=d;el.appendChild(num);
    if(dk===todayKey)el.classList.add('today');
    if(entryDates.has(dk)){el.classList.add('has-entry');const dot=document.createElement('div');dot.className='cal-dot';el.appendChild(dot);}
    if(dk===selectedDay)el.classList.add('selected');
    el.onclick=()=>{selectedDay=dk;renderCal();showPastEntry(dk);};
    grid.appendChild(el);
  }
}
function showPastEntry(dk){
  const disp=document.getElementById('past-entry-display');
  const e=getEntry(dk);
  if(!e){disp.innerHTML='<div class="no-entry">No entry for this day</div>';return;}
  const parts=dk.split('-');
  const d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  let html='<div class="past-card"><div class="past-date-label">';
  if(e.mood)html+='<span style="font-size:18px;margin-right:6px">'+MOOD_EMOJI[e.mood]+'</span>';
  html+=DAYS[d.getDay()]+', '+MONTHS[d.getMonth()]+' '+d.getDate()+'</div>';
  html+='<div class="past-chips">';
  settings.checklist.forEach(label=>{
    const key=label.toLowerCase().replace(/[^a-z0-9]/g,'_');
    html+='<span class="chip '+(e.checks&&e.checks[key]?'done':'miss')+'">'+label+'</span>';
  });
  html+='</div>';
  if(e.focusData){
    settings.focusAreas.forEach((area,idx)=>{
      const fd=e.focusData['focus_'+idx];if(!fd)return;
      let items=[];
      if(area.type==='log'&&fd.entries&&fd.entries.length)items=fd.entries;
      else if(area.type==='tags'&&fd.tags&&fd.tags.length)items=fd.tags;
      else if(area.type==='checks'&&fd.checks&&fd.checks.length)items=fd.checks;
      else if(area.type==='tasks'&&fd.tasks&&fd.tasks.length)items=fd.tasks.map(t=>(t.done?'✓ ':'')+t.label);
      if(items.length)html+='<div class="past-section"><div class="past-section-title">'+area.name+'</div><div class="past-items">'+items.map(v=>'<span class="past-item">'+v+'</span>').join('')+'</div></div>';
    });
  }
  if(e.note)html+='<div class="past-section"><div class="past-section-title">Notes</div><div class="past-note">'+e.note+'</div></div>';
  html+='</div>';
  disp.innerHTML=html;
}
function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCal();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCal();}

// STATS
function renderStats(){
  const y=now.getFullYear(),m=now.getMonth();
  const prefix=y+'-'+String(m+1).padStart(2,'0')+'-';
  const entries=allEntries.filter(r=>r.date.startsWith(prefix)).map(r=>r.data).filter(Boolean);
  const total=settings.checklist.length||1;
  document.getElementById('stat-entries').textContent=entries.length;
  document.getElementById('stat-perfect').textContent=entries.filter(e=>settings.checklist.every(label=>{const k=label.toLowerCase().replace(/[^a-z0-9]/g,'_');return e.checks&&e.checks[k];})).length;
  document.getElementById('stat-avg').textContent=entries.length?Math.round(entries.reduce((s,e)=>s+settings.checklist.filter(label=>{const k=label.toLowerCase().replace(/[^a-z0-9]/g,'_');return e.checks&&e.checks[k];}).length,0)/entries.length):0;
  let streak=0,d=new Date();
  while(true){const dk=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');if(getEntry(dk)){streak++;d.setDate(d.getDate()-1);}else break;}
  document.getElementById('stat-streak').textContent=streak;
  const bars=document.getElementById('check-bars');bars.innerHTML='';
  settings.checklist.forEach(label=>{
    const key=label.toLowerCase().replace(/[^a-z0-9]/g,'_');
    const pct=entries.length?Math.round(entries.filter(e=>e.checks&&e.checks[key]).length/entries.length*100):0;
    bars.innerHTML+='<div class="bar-row"><span class="bar-label">'+label+'</span><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%"></div></div><span class="bar-pct">'+pct+'%</span></div>';
  });
  const moodWrap=document.getElementById('mood-stats');moodWrap.innerHTML='';
  const mc=[0,0,0,0,0,0];
  entries.forEach(e=>{if(e.mood&&e.mood>=1&&e.mood<=5)mc[e.mood]++;});
  let any=false;
  for(let i=1;i<=5;i++){if(mc[i]>0){moodWrap.innerHTML+='<div class="mood-stat"><span style="font-size:20px">'+MOOD_EMOJI[i]+'</span><span>'+mc[i]+'x '+MOOD_LABELS[i]+'</span></div>';any=true;}}
  if(!any)moodWrap.innerHTML='<span style="color:var(--text-hint);font-size:14px">No mood data yet</span>';
}

// CUSTOMIZE
function renderCustomize(){
  custSettings=JSON.parse(JSON.stringify(settings));

  // Checklist
  const cl=document.getElementById('cust-checklist');cl.innerHTML='';
  custSettings.checklist.forEach((label,i)=>{
    const row=document.createElement('div');row.className='cust-item';
    row.innerHTML='<input type="text" value="'+label+'" /><button class="del-btn" onclick="custDelCheck('+i+')">&#215;</button>';
    row.querySelector('input').addEventListener('input',e=>{custSettings.checklist[i]=e.target.value;});
    cl.appendChild(row);
  });

  // Focus areas
  const fa=document.getElementById('cust-focus-areas');fa.innerHTML='';
  custSettings.focusAreas.forEach((area,i)=>renderCustFocusArea(area,i));
}

function renderCustFocusArea(area,i){
  const fa=document.getElementById('cust-focus-areas');
  const block=document.createElement('div');block.className='focus-area-block';block.id='cust-fa-'+i;
  const typeOptions=['log','tags','checks','tasks'].map(t=>'<option value="'+t+'"'+(area.type===t?' selected':'')+'>'+t+'</option>').join('');
  let itemsHtml='';
  if(area.type==='tags'||area.type==='checks'){
    itemsHtml='<div class="cust-list" id="cust-fa-items-'+i+'">';
    (area.items||[]).forEach((item,j)=>{
      itemsHtml+='<div class="cust-item"><input type="text" value="'+item+'" onchange="custSettings.focusAreas['+i+'].items['+j+']=this.value" /><button class="del-btn" onclick="custDelFocusItem('+i+','+j+')">&#215;</button></div>';
    });
    itemsHtml+='</div><div class="cust-add-row"><input id="cust-fa-item-input-'+i+'" type="text" placeholder="Add item..." /><button class="add-btn" onclick="custAddFocusItem('+i+')">+</button></div>';
  }
  block.innerHTML=
    '<div class="focus-area-header">'+
    '<input type="text" value="'+area.name+'" onchange="custSettings.focusAreas['+i+'].name=this.value" />'+
    '<select class="focus-type-select" onchange="custSettings.focusAreas['+i+'].type=this.value;renderCustomize()">'+typeOptions+'</select>'+
    '<button class="del-btn" onclick="custDelFocus('+i+')">&#215;</button>'+
    '</div>'+itemsHtml;
  fa.appendChild(block);
}

function custAddCheck(){
  const inp=document.getElementById('cust-check-input');const v=inp.value.trim();if(!v)return;
  custSettings.checklist.push(v);
  const i=custSettings.checklist.length-1;
  const row=document.createElement('div');row.className='cust-item';
  row.innerHTML='<input type="text" value="'+v+'" /><button class="del-btn" onclick="custDelCheck('+i+')">&#215;</button>';
  row.querySelector('input').addEventListener('input',e=>{custSettings.checklist[i]=e.target.value;});
  document.getElementById('cust-checklist').appendChild(row);
  inp.value='';
}
function custDelCheck(i){custSettings.checklist.splice(i,1);renderCustomize();}

function custAddFocus(){
  const inp=document.getElementById('cust-focus-input');const v=inp.value.trim();if(!v)return;
  custSettings.focusAreas.push({name:v,type:'tasks'});
  renderCustFocusArea(custSettings.focusAreas[custSettings.focusAreas.length-1],custSettings.focusAreas.length-1);
  inp.value='';
}
function custDelFocus(i){custSettings.focusAreas.splice(i,1);renderCustomize();}
function custAddFocusItem(i){
  const inp=document.getElementById('cust-fa-item-input-'+i);const v=inp.value.trim();if(!v)return;
  if(!custSettings.focusAreas[i].items)custSettings.focusAreas[i].items=[];
  custSettings.focusAreas[i].items.push(v);renderCustomize();
}
function custDelFocusItem(i,j){custSettings.focusAreas[i].items.splice(j,1);renderCustomize();}

document.getElementById('cust-check-input').addEventListener('keydown',e=>{if(e.key==='Enter')custAddCheck();});
document.getElementById('cust-focus-input').addEventListener('keydown',e=>{if(e.key==='Enter')custAddFocus();});

// SETTINGS / COLOR
function applyAccent(c){
  const r=document.documentElement.style;
  r.setProperty('--accent',c.accent);r.setProperty('--accent-light',c.light);
  r.setProperty('--accent-mid',c.mid);r.setProperty('--accent-dark',c.dark);
  document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('selected',s.dataset.name===c.name));
}
function buildSwatches(){
  const saved=gl('accent-color')||'Teal';
  const wrap=document.getElementById('color-swatches');
  COLORS.forEach(c=>{
    const s=document.createElement('div');s.className='swatch'+(c.name===saved?' selected':'');
    s.dataset.name=c.name;s.style.background=c.accent;s.title=c.name;
    s.onclick=()=>{sl('accent-color',c.name);applyAccent(c);};
    wrap.appendChild(s);
    if(c.name===saved)applyAccent(c);
  });
}

// NAVIGATION
function showView(v){
  ['today','history','stats','customize','settings'].forEach(n=>{
    const el=document.getElementById(n+'-view');if(el)el.style.display='none';
    const tab=document.getElementById('tab-'+n);if(tab)tab.classList.remove('active');
  });
  const el=document.getElementById(v+'-view');
  el.style.display=v==='today'?'flex':'block';
  if(v==='today'){el.style.flexDirection='column';el.style.flex='1';}
  const tab=document.getElementById('tab-'+v);if(tab)tab.classList.add('active');
  document.getElementById('progress-wrap').style.display=v==='today'?'block':'none';
  if(v==='history')renderCal();
  if(v==='stats')renderStats();
  if(v==='customize')renderCustomize();
  if(v==='settings'){const t=document.getElementById('dark-toggle');if(t)t.checked=gl('theme')==='dark';}
}

function applyTheme(dark){
  if(dark){document.documentElement.setAttribute('data-theme','dark');}
  else{document.documentElement.removeAttribute('data-theme');}
  const t=document.getElementById('dark-toggle');
  if(t)t.checked=dark;
}
function toggleDarkMode(on){
  sl('theme',on?'dark':'light');
  applyTheme(on);
}
function initTheme(){
  const saved=gl('theme');
  if(saved){applyTheme(saved==='dark');}
}
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js');});}

initTheme();
const savedCode=gl('journal_code');
if(savedCode){initApp(savedCode);}
</script>
</body>
