<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Journal">
<meta name="theme-color" content="#1D9E75">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Daily Journal</title>
<style>
  :root {
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-mid: #9FE1CB;
    --green-dark: #0F6E56;
    --text: #1a1a1a;
    --text-muted: #6b7280;
    --text-hint: #9ca3af;
    --border: rgba(0,0,0,0.12);
    --border-mid: rgba(0,0,0,0.2);
    --bg: #ffffff;
    --bg-surface: #f9f9f7;
    --bg-card: #ffffff;
    --radius: 10px;
    --radius-lg: 14px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --text: #f0f0ee;
      --text-muted: #9ca3af;
      --text-hint: #6b7280;
      --border: rgba(255,255,255,0.12);
      --border-mid: rgba(255,255,255,0.2);
      --bg: #111110;
      --bg-surface: #1a1a18;
      --bg-card: #1f1f1d;
      --green-light: #04342C;
      --green-mid: #085041;
      --green-dark: #9FE1CB;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body { padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }

  .app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  .header { padding: 16px 20px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid var(--border); }
  .header-date { }
  .header-day { font-size: 22px; font-weight: 600; color: var(--text); }
  .header-sub { font-size: 13px; color: var(--text-muted); margin-top: 1px; }
  .header-nav { display: flex; gap: 8px; }
  .nav-tab { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; border: none; background: transparent; color: var(--text-muted); cursor: pointer; }
  .nav-tab.active { background: var(--green); color: white; }

  /* Progress */
  .progress-wrap { padding: 10px 20px; }
  .progress-row { display: flex; align-items: center; gap: 10px; }
  .progress-bar { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.4s ease; }
  .progress-label { font-size: 12px; color: var(--text-muted); min-width: 32px; text-align: right; }

  /* Scrollable content */
  .content { flex: 1; overflow-y: auto; padding: 16px 20px 100px; }

  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; margin-top: 20px; }
  .section-label:first-child { margin-top: 0; }

  /* Checklist */
  .checklist { display: flex; flex-direction: column; gap: 6px; }
  .check-item { display: flex; align-items: center; gap: 12px; padding: 13px 14px; border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--bg-card); cursor: pointer; transition: all 0.15s; user-select: none; }
  .check-item.done { border-color: var(--green-mid); background: var(--green-light); }
  .check-item.done .check-label { color: var(--green-dark); text-decoration: line-through; text-decoration-color: var(--green-mid); }
  .check-circle { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border-mid); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .check-item.done .check-circle { background: var(--green); border-color: var(--green); }
  .checkmark { width: 10px; height: 7px; border-left: 2px solid white; border-bottom: 2px solid white; transform: rotate(-45deg) translate(1px,-1px); opacity: 0; }
  .check-item.done .checkmark { opacity: 1; }
  .check-label { font-size: 15px; color: var(--text); }

  /* Category cards */
  .cat-grid { display: flex; flex-direction: column; gap: 10px; }
  .cat-card { border-radius: var(--radius-lg); border: 0.5px solid var(--border); background: var(--bg-card); overflow: hidden; }
  .cat-header { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
  .cat-title { font-size: 15px; font-weight: 500; color: var(--text); }
  .cat-arrow { font-size: 11px; color: var(--text-hint); transition: transform 0.2s; }
  .cat-card.open .cat-arrow { transform: rotate(180deg); }
  .cat-body { display: none; padding: 0 16px 14px; flex-direction: column; gap: 8px; border-top: 0.5px solid var(--border); padding-top: 12px; }
  .cat-card.open .cat-body { display: flex; }

  /* Sub checks */
  .sub-check { display: flex; align-items: center; gap: 10px; padding: 8px 0; cursor: pointer; user-select: none; }
  .sub-box { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--border-mid); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .sub-check.done .sub-box { background: var(--green); border-color: var(--green); }
  .sub-mark { width: 9px; height: 6px; border-left: 1.5px solid white; border-bottom: 1.5px solid white; transform: rotate(-45deg) translate(1px,-1px); opacity: 0; }
  .sub-check.done .sub-mark { opacity: 1; }
  .sub-label { font-size: 14px; color: var(--text-muted); }
  .sub-check.done .sub-label { color: var(--green-dark); text-decoration: line-through; text-decoration-color: var(--green-mid); }

  /* Fitness tags */
  .tag-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
  .ftag { font-size: 13px; padding: 6px 12px; border-radius: 20px; border: 0.5px solid var(--border); background: var(--bg-surface); color: var(--text-muted); cursor: pointer; user-select: none; transition: all 0.15s; }
  .ftag.active { background: var(--green-light); border-color: var(--green-mid); color: var(--green-dark); font-weight: 500; }

  /* Row inputs */
  .row-input { display: flex; gap: 8px; }
  .row-input input, .row-input-solo { flex: 1; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 12px; font-size: 14px; font-family: inherit; color: var(--text); background: var(--bg-surface); outline: none; min-width: 0; }
  .row-input input:focus { border-color: var(--green); }
  .add-btn { border: 0.5px solid var(--border-mid); border-radius: var(--radius); background: transparent; padding: 10px 14px; font-size: 18px; color: var(--text-muted); cursor: pointer; }
  .add-btn:active { background: var(--bg-surface); }

  /* Vinyl entries */
  .vinyl-entry { font-size: 14px; color: var(--text); padding: 6px 0; border-bottom: 0.5px solid var(--border); }
  .vinyl-entry:last-of-type { border-bottom: none; }

  /* House items */
  .house-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; cursor: pointer; user-select: none; border-bottom: 0.5px solid var(--border); }
  .house-item:last-of-type { border-bottom: none; }
  .house-item.done .sub-label { color: var(--green-dark); text-decoration: line-through; text-decoration-color: var(--green-mid); }
  .house-item.done .sub-box { background: var(--green); border-color: var(--green); }
  .house-item.done .sub-mark { opacity: 1; }

  /* Save button */
  .save-wrap { padding: 16px 20px; border-top: 0.5px solid var(--border); background: var(--bg); }
  .save-btn { width: 100%; padding: 14px; border-radius: var(--radius-lg); border: none; background: var(--green); color: white; font-size: 16px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.15s; }
  .save-btn:active { transform: scale(0.98); opacity: 0.9; }
  .save-btn.saved { background: var(--green-mid); color: var(--green-dark); }

  /* History view */
  #history-view { display: none; }
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .cal-nav span { font-size: 16px; font-weight: 500; }
  .cal-nav button { border: 0.5px solid var(--border); border-radius: var(--radius); background: transparent; padding: 7px 14px; font-size: 15px; color: var(--text-muted); cursor: pointer; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 16px; }
  .cal-dow { font-size: 11px; color: var(--text-hint); text-align: center; padding: 4px 0; }
  .cal-day { aspect-ratio: 1; border-radius: var(--radius); border: 0.5px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; color: var(--text-muted); background: var(--bg-card); gap: 3px; }
  .cal-day.empty { border-color: transparent; background: transparent; cursor: default; }
  .cal-day.today { border-color: var(--green); color: var(--green-dark); font-weight: 600; }
  .cal-day.has-entry { background: var(--green-light); border-color: var(--green-mid); }
  .cal-day.has-entry .cal-num { color: var(--green-dark); font-weight: 500; }
  .cal-day.selected { border: 2px solid var(--green); }
  .cal-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--green); }

  .past-card { border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; background: var(--bg-card); }
  .past-date-label { font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 12px; }
  .past-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
  .chip { font-size: 12px; padding: 4px 10px; border-radius: 20px; }
  .chip.done { background: var(--green-light); color: var(--green-dark); border: 0.5px solid var(--green-mid); }
  .chip.miss { background: var(--bg-surface); color: var(--text-hint); border: 0.5px solid var(--border); }
  .past-section { margin-top: 10px; }
  .past-section-title { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
  .past-items { display: flex; flex-wrap: wrap; gap: 5px; }
  .past-item { font-size: 12px; padding: 4px 10px; border-radius: 20px; background: var(--bg-surface); color: var(--text-muted); border: 0.5px solid var(--border); }
  .past-item.done { background: var(--green-light); color: var(--green-dark); border-color: var(--green-mid); }
  .no-entry { text-align: center; padding: 2rem; color: var(--text-hint); font-size: 14px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-date">
      <div class="header-day" id="header-day"></div>
      <div class="header-sub" id="header-sub"></div>
    </div>
    <div class="header-nav">
      <button class="nav-tab active" id="tab-today" onclick="showView('today')">Today</button>
      <button class="nav-tab" id="tab-history" onclick="showView('history')">History</button>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-row">
      <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
      <div class="progress-label" id="progress-label">0/9</div>
    </div>
  </div>

  <div id="today-view">
    <div class="content">
      <div class="section-label">Daily checklist</div>
      <div class="checklist">
        <div class="check-item" data-key="sunshine"><div class="check-circle"><div class="checkmark"></div></div><span class="check-label">Sunshine</span></div>
        <div class="check-item" data-key="fitness"><div class="check-circle"><div class="checkmark"></div></div><span class="check-label">Some fitness</span></div>
        <div class="check-item" data-key="vinyl"><div class="check-circle"><div class="checkmark"></div></div><span class="check-label">Vinyl / iPod</span></div>
        <div class="check-item" data-key="rest"><div class="check-circle"><div class="checkmark"></div></div><span class="check-label">Rest</span></div>
        <div class="check-item" data-key="recovery"><div class="check-circle"><div class="checkmark"></div></div><span class="check-label">Recovery</span></div>
        <div class="check-item" data-key="read4growth"><div class="check-circle"><div class="checkmark"></div></div><span class="check-label">Read 4 growth</span></div>
        <div class="check-item" data-key="house"><div class="check-circle"><div class="checkmark"></div></div><span class="check-label">Touch house</span></div>
        <div class="check-item" data-key="music"><div class="check-circle"><div class="checkmark"></div></div><span class="check-label">Some music</span></div>
        <div class="check-item" data-key="news"><div class="check-circle"><div class="checkmark"></div></div><span class="check-label">Some news</span></div>
      </div>

      <div class="section-label">Focus areas</div>
      <div class="cat-grid">

        <div class="cat-card" id="cat-vinyl">
          <div class="cat-header" onclick="toggleCat('cat-vinyl')">
            <span class="cat-title">Vinyl / iPod</span><span class="cat-arrow">▾</span>
          </div>
          <div class="cat-body">
            <div id="vinyl-log"></div>
            <div class="row-input">
              <input id="vinyl-input" type="text" placeholder="What did you listen to?" />
              <button class="add-btn" onclick="addVinyl()">+</button>
            </div>
          </div>
        </div>

        <div class="cat-card" id="cat-fitness">
          <div class="cat-header" onclick="toggleCat('cat-fitness')">
            <span class="cat-title">Fitness</span><span class="cat-arrow">▾</span>
          </div>
          <div class="cat-body">
            <div class="tag-wrap" id="fitness-tags">
              <div class="ftag" onclick="toggleFtag(this)">Stretch</div>
              <div class="ftag" onclick="toggleFtag(this)">VR Boxing</div>
              <div class="ftag" onclick="toggleFtag(this)">Spin Bike</div>
              <div class="ftag" onclick="toggleFtag(this)">Walk</div>
              <div class="ftag" onclick="toggleFtag(this)">Yoga</div>
            </div>
            <div class="row-input">
              <input id="fitness-input" type="text" placeholder="Other exercise..." />
              <button class="add-btn" onclick="addFitness()">+</button>
            </div>
          </div>
        </div>

        <div class="cat-card" id="cat-hygge">
          <div class="cat-header" onclick="toggleCat('cat-hygge')">
            <span class="cat-title">Hygge</span><span class="cat-arrow">▾</span>
          </div>
          <div class="cat-body">
            <div class="sub-check" data-hygge="read" onclick="toggleSub(this)"><div class="sub-box"><div class="sub-mark"></div></div><span class="sub-label">Read</span></div>
            <div class="sub-check" data-hygge="write" onclick="toggleSub(this)"><div class="sub-box"><div class="sub-mark"></div></div><span class="sub-label">Write</span></div>
            <div class="sub-check" data-hygge="type" onclick="toggleSub(this)"><div class="sub-box"><div class="sub-mark"></div></div><span class="sub-label">Type</span></div>
            <div class="sub-check" data-hygge="knit" onclick="toggleSub(this)"><div class="sub-box"><div class="sub-mark"></div></div><span class="sub-label">Knit</span></div>
            <div class="sub-check" data-hygge="game" onclick="toggleSub(this)"><div class="sub-box"><div class="sub-mark"></div></div><span class="sub-label">Game</span></div>
          </div>
        </div>

        <div class="cat-card" id="cat-house">
          <div class="cat-header" onclick="toggleCat('cat-house')">
            <span class="cat-title">House</span><span class="cat-arrow">▾</span>
          </div>
          <div class="cat-body">
            <div id="house-items"></div>
            <div class="row-input">
              <input id="house-input" type="text" placeholder="Add a chore..." />
              <button class="add-btn" onclick="addHouse()">+</button>
            </div>
          </div>
        </div>

      </div>
    </div>
    <div class="save-wrap">
      <button class="save-btn" id="save-btn" onclick="saveEntry()">Save today</button>
    </div>
  </div>

  <div id="history-view">
    <div class="content">
      <div class="cal-nav">
        <button onclick="calPrev()">&#8592;</button>
        <span id="cal-month-label"></span>
        <button onclick="calNext()">&#8594;</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div id="past-entry-display"></div>
    </div>
  </div>
</div>

<script>
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const CL_KEYS = ['sunshine','fitness','vinyl','rest','recovery','read4growth','house','music','news'];
const CL_LABELS = {sunshine:'Sunshine',fitness:'Some fitness',vinyl:'Vinyl / iPod',rest:'Rest',recovery:'Recovery',read4growth:'Read 4 growth',house:'Touch house',music:'Some music',news:'Some news'};

const now = new Date();
const todayKey = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
document.getElementById('header-day').textContent = DAYS[now.getDay()];
document.getElementById('header-sub').textContent = MONTHS[now.getMonth()]+' '+now.getDate()+', '+now.getFullYear();

let state = {checks:{},vinyl:[],fitness:[],hygge:[],house:[]};
let calYear = now.getFullYear(), calMonth = now.getMonth(), selectedDay = null;

function saveLocal(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){} }
function loadLocal(key){ try{ const v=localStorage.getItem(key); return v?JSON.parse(v):null; }catch(e){ return null; } }
function getAllEntryKeys(){ try{ return Object.keys(localStorage).filter(k=>k.startsWith('journal:')); }catch(e){ return []; } }

function loadToday(){
  const saved = loadLocal('journal:'+todayKey);
  if(saved){ state = saved; applyState(); }
}

function applyState(){
  document.querySelectorAll('.check-item').forEach(el=>{
    el.classList.toggle('done', !!(state.checks&&state.checks[el.dataset.key]));
  });
  updateProgress();
  document.getElementById('vinyl-log').innerHTML='';
  (state.vinyl||[]).forEach(v=>{ const d=document.createElement('div'); d.className='vinyl-entry'; d.textContent=v; document.getElementById('vinyl-log').appendChild(d); });
  document.querySelectorAll('.ftag').forEach(t=>{ t.classList.toggle('active',(state.fitness||[]).includes(t.textContent)); });
  document.querySelectorAll('.sub-check[data-hygge]').forEach(el=>{ el.classList.toggle('done',(state.hygge||[]).includes(el.dataset.hygge)); });
  document.getElementById('house-items').innerHTML='';
  (state.house||[]).forEach(item=>renderHouseItem(item));
}

function updateProgress(){
  const done = CL_KEYS.filter(k=>state.checks&&state.checks[k]).length;
  document.getElementById('progress').style.width=Math.round(done/9*100)+'%';
  document.getElementById('progress-label').textContent=done+'/9';
}

document.querySelectorAll('.check-item').forEach(el=>{
  el.addEventListener('click',()=>{
    el.classList.toggle('done');
    if(!state.checks) state.checks={};
    state.checks[el.dataset.key]=el.classList.contains('done');
    updateProgress();
  });
});

function toggleCat(id){ document.getElementById(id).classList.toggle('open'); }

function toggleSub(el){
  el.classList.toggle('done');
  const k=el.dataset.hygge;
  if(!state.hygge) state.hygge=[];
  if(el.classList.contains('done')){ if(!state.hygge.includes(k)) state.hygge.push(k); }
  else{ state.hygge=state.hygge.filter(x=>x!==k); }
}

function toggleFtag(el){
  el.classList.toggle('active');
  if(!state.fitness) state.fitness=[];
  const v=el.textContent;
  if(el.classList.contains('active')){ if(!state.fitness.includes(v)) state.fitness.push(v); }
  else{ state.fitness=state.fitness.filter(x=>x!==v); }
}

function addVinyl(){
  const inp=document.getElementById('vinyl-input');
  const v=inp.value.trim(); if(!v) return;
  if(!state.vinyl) state.vinyl=[];
  state.vinyl.push(v);
  const d=document.createElement('div'); d.className='vinyl-entry'; d.textContent=v;
  document.getElementById('vinyl-log').appendChild(d);
  inp.value='';
}

function addFitness(){
  const inp=document.getElementById('fitness-input');
  const v=inp.value.trim(); if(!v) return;
  if(!state.fitness) state.fitness=[];
  if(!state.fitness.includes(v)) state.fitness.push(v);
  const tag=document.createElement('div'); tag.className='ftag active'; tag.textContent=v;
  tag.onclick=()=>toggleFtag(tag);
  document.getElementById('fitness-tags').appendChild(tag);
  inp.value='';
}

function renderHouseItem(item){
  const el=document.createElement('div'); el.className='house-item'+(item.done?' done':'');
  el.innerHTML='<div class="sub-box"><div class="sub-mark"></div></div><span class="sub-label">'+item.label+'</span>';
  el.onclick=()=>{
    el.classList.toggle('done');
    item.done=el.classList.contains('done');
    if(el.classList.contains('done')){ el.querySelector('.sub-box').style.background=getComputedStyle(document.documentElement).getPropertyValue('--green').trim(); }
    else{ el.querySelector('.sub-box').style.background=''; }
  };
  document.getElementById('house-items').appendChild(el);
}

function addHouse(){
  const inp=document.getElementById('house-input');
  const v=inp.value.trim(); if(!v) return;
  if(!state.house) state.house=[];
  const item={label:v,done:false};
  state.house.push(item);
  renderHouseItem(item);
  inp.value='';
}

document.querySelectorAll('input').forEach(inp=>{
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){
      if(inp.id==='vinyl-input') addVinyl();
      if(inp.id==='fitness-input') addFitness();
      if(inp.id==='house-input') addHouse();
    }
  });
});

function saveEntry(){
  saveLocal('journal:'+todayKey, state);
  const btn=document.getElementById('save-btn');
  btn.textContent='Saved'; btn.classList.add('saved');
  setTimeout(()=>{ btn.textContent='Save today'; btn.classList.remove('saved'); },2000);
}

function showView(v){
  document.getElementById('today-view').style.display=v==='today'?'flex':'none';
  document.getElementById('today-view').style.flexDirection='column';
  document.getElementById('today-view').style.flex='1';
  document.getElementById('history-view').style.display=v==='history'?'block':'none';
  document.getElementById('tab-today').classList.toggle('active',v==='today');
  document.getElementById('tab-history').classList.toggle('active',v==='history');
  document.querySelector('.progress-wrap').style.display=v==='today'?'block':'none';
  if(v==='history') renderCal();
}

function renderCal(){
  const entryDates = new Set(getAllEntryKeys().map(k=>k.replace('journal:','')));
  document.getElementById('cal-month-label').textContent=MONTHS[calMonth]+' '+calYear;
  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d=>{ const el=document.createElement('div'); el.className='cal-dow'; el.textContent=d; grid.appendChild(el); });
  const first=new Date(calYear,calMonth,1).getDay();
  const total=new Date(calYear,calMonth+1,0).getDate();
  for(let i=0;i<first;i++){ const el=document.createElement('div'); el.className='cal-day empty'; grid.appendChild(el); }
  for(let d=1;d<=total;d++){
    const dk=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const el=document.createElement('div'); el.className='cal-day';
    const num=document.createElement('span'); num.className='cal-num'; num.textContent=d; el.appendChild(num);
    if(dk===todayKey) el.classList.add('today');
    if(entryDates.has(dk)){ el.classList.add('has-entry'); const dot=document.createElement('div'); dot.className='cal-dot'; el.appendChild(dot); }
    if(dk===selectedDay) el.classList.add('selected');
    el.onclick=()=>{ selectedDay=dk; renderCal(); showPastEntry(dk,entryDates); };
    grid.appendChild(el);
  }
}

function showPastEntry(dk, entryDates){
  const disp=document.getElementById('past-entry-display');
  if(!entryDates.has(dk)){ disp.innerHTML='<div class="no-entry">No entry for this day</div>'; return; }
  const e=loadLocal('journal:'+dk);
  if(!e){ disp.innerHTML='<div class="no-entry">Could not load entry</div>'; return; }
  const parts=dk.split('-');
  const d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  let html='<div class="past-card"><div class="past-date-label">'+DAYS[d.getDay()]+', '+MONTHS[d.getMonth()]+' '+d.getDate()+'</div>';
  html+='<div class="past-chips">';
  CL_KEYS.forEach(k=>{ html+='<span class="chip '+(e.checks&&e.checks[k]?'done':'miss')+'">'+CL_LABELS[k]+'</span>'; });
  html+='</div>';
  if(e.vinyl&&e.vinyl.length){ html+='<div class="past-section"><div class="past-section-title">Vinyl / iPod</div><div class="past-items">'; e.vinyl.forEach(v=>{ html+='<span class="past-item">'+v+'</span>'; }); html+='</div></div>'; }
  if(e.fitness&&e.fitness.length){ html+='<div class="past-section"><div class="past-section-title">Fitness</div><div class="past-items">'; e.fitness.forEach(v=>{ html+='<span class="past-item">'+v+'</span>'; }); html+='</div></div>'; }
  if(e.hygge&&e.hygge.length){ html+='<div class="past-section"><div class="past-section-title">Hygge</div><div class="past-items">'; e.hygge.forEach(v=>{ html+='<span class="past-item">'+v+'</span>'; }); html+='</div></div>'; }
  if(e.house&&e.house.length){ html+='<div class="past-section"><div class="past-section-title">House</div><div class="past-items">'; e.house.forEach(v=>{ html+='<span class="past-item'+(v.done?' done':'')+'">'+v.label+'</span>'; }); html+='</div></div>'; }
  html+='</div>';
  disp.innerHTML=html;
}

function calPrev(){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCal(); }
function calNext(){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCal(); }

if('serviceWorker' in navigator){ window.addEventListener('load',()=>{ navigator.serviceWorker.register('./sw.js'); }); }

loadToday();
</script>
